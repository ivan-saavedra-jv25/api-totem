name: CI/CD Pipeline - Totem API

# Triggers - Cuándo se ejecuta el pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Variables de entorno globales
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build y Test
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    # Strategy para pruebas con múltiples versiones de Python
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
      # 1️⃣ Checkout del repositorio
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2️⃣ Setup Python
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      # 3️⃣ Instalar dependencias
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      # 4️⃣ Ejecutar tests
      - name: 🧪 Run tests
        run: |
          pytest tests/ -v --cov=app --cov-report=xml
      
      # 5️⃣ Upload coverage reports
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Job 2: Build Docker Image
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      # 1️⃣ Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2️⃣ Set up Docker Buildx
      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 3️⃣ Log in to Container Registry
      - name: 🔐 Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 4️⃣ Extract metadata
      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      # 5️⃣ Build and push Docker image
      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 6️⃣ Output image digest
      - name: 📤 Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # Job 3: Security Scan
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'
    
    steps:
      # 1️⃣ Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2️⃣ Run Trivy vulnerability scanner
      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      # 3️⃣ Upload Trivy scan results to GitHub Security tab
      - name: 📤 Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 4: Deploy to Staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    
    steps:
      # 1️⃣ Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2️⃣ Deploy to staging server
      - name: 🚀 Deploy to staging
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/totem-api
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker system prune -f

  # Job 5: Deploy to Production
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      # 1️⃣ Checkout
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2️⃣ Deploy to production server
      - name: 🚀 Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/totem-api
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker system prune -f
            
      # 3️⃣ Health check
      - name: 🏥 Health check
        run: |
          sleep 30
          curl -f ${{ secrets.PROD_URL }}/health || exit 1
