version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: totem-api:latest
    container_name: totem-api-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://totem:${POSTGRES_PASSWORD}@postgres:5432/totem
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - totem-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: totem-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: totem
      POSTGRES_USER: totem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - totem-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx reverse proxy (opcional para producción)
  nginx:
    image: nginx:alpine
    container_name: totem-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - totem-network

volumes:
  postgres_data:
    driver: local

networks:
  totem-network:
    driver: bridge
